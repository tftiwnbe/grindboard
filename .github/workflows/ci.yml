name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: "server/pyproject.toml"

      - name: Install dependencies
        working-directory: server
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e ".[dev]"

      - name: Lint backend
        working-directory: server
        run: ruff check app tests

      - name: Run tests
        working-directory: server
        run: pytest -v --asyncio-mode=auto

  lint-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          package_json_file: "web/package.json"

      - name: Install dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Type check
        working-directory: web
        run: pnpm check

      - name: Build frontend
        working-directory: web
        run: pnpm build

  docker-build-test:
    runs-on: ubuntu-latest
    needs: [test-backend, lint-frontend]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (test)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: grindboard:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      - name: Test Docker image
        run: |
          docker run --rm -d --name grindboard-test \
            -e GRINDBOARD__AUTH__JWT_SECRET_KEY=ci-test-secret \
            -p 3000:3000 \
            grindboard:test

          cleanup() {
            docker logs grindboard-test || true
            docker stop grindboard-test || true
          }
          trap cleanup EXIT

          curl --fail --silent --show-error \
            --retry 15 \
            --retry-all-errors \
            --retry-delay 1 \
            http://127.0.0.1:3000/healthz

          test "$(docker inspect --format='{{.State.Health.Status}}' grindboard-test)" = "healthy"
